<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#Film猫 · 多人胶片日志</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --ink: #1a1814;
  --paper: #f7f4ef;
  --paper2: #f0ece4;
  --rule: #d4cfc6;
  --muted: #9a9088;
  --accent: #2a2420;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 18px 40px 14px;
  border-bottom: 1px solid var(--ink);
}

.nav-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  letter-spacing: 4px;
  font-weight: 300;
}

.nav-logo strong {
  font-weight: 600;
  font-size: 17px;
  letter-spacing: 2px;
}

.nav-right {
  display: flex;
  gap: 24px;
  align-items: center;
}

.nav-tag {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
}

.nav-user {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--ink);
  display: inline-block;
}

.masthead {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  padding: 40px 40px 32px;
  border-bottom: 1px solid var(--rule);
}

.masthead-left {
  padding-right: 32px;
}

.masthead-rule {
  background: var(--rule);
}

.masthead-right {
  padding-left: 32px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.mag-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 64px;
  line-height: 1;
  letter-spacing: -1px;
  margin-bottom: 4px;
}

.mag-hash {
  font-size: 28px;
  font-style: normal;
}

.mag-tagline {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--muted);
  margin-top: 10px;
  text-transform: uppercase;
}

.masthead-meta {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  line-height: 2.2;
}

.masthead-meta span {
  display: block;
}

.masthead-count {
  font-family: 'Noto Serif JP', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--ink);
  margin-top: 8px;
}

.masthead-count small {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  display: block;
  margin-top: 2px;
}

.upload-strip {
  padding: 20px 40px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 16px;
}

.upload-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 24px;
  border: none;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  transition: opacity 0.2s;
  flex-shrink: 0;
}

.upload-btn:hover {
  opacity: 0.8;
}

.upload-drop-zone {
  flex: 1;
  border: 1px dashed var(--rule);
  padding: 10px 16px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s;
}

.upload-drop-zone:hover,
.upload-drop-zone.dragover {
  border-color: var(--ink);
}

#fileInput {
  display: none;
}

.gallery {
  padding: 0 40px 60px;
}

.issue-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 28px;
}

.issue-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
}

.issue-line {
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.zine-grid {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.zine-entry {
  border-bottom: 1px solid var(--rule);
  padding: 32px 0;
}

.zine-entry:last-child {
  border-bottom: none;
}

.layout-a {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 0;
}

.layout-b {}

.layout-c {
  display: grid;
  grid-template-columns: 2fr 3fr;
  gap: 0;
}

.entry-img-wrap {
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.entry-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.04) brightness(0.98);
  transition: filter 0.3s;
}

.entry-img-wrap:hover img {
  filter: contrast(1.08) brightness(0.95);
}

.layout-a .entry-img-wrap {
  height: 380px;
}

.layout-b .entry-img-wrap {
  height: 440px;
}

.layout-c .entry-img-wrap {
  height: 320px;
}

.entry-body {
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.layout-b .entry-body {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0;
  padding: 24px 0 0;
}

.layout-b .entry-col1 {
  padding-right: 28px;
}

.layout-b .entry-col-rule {
  background: var(--rule);
}

.layout-b .entry-col2 {
  padding-left: 28px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.entry-no {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 16px;
  display: block;
}

.entry-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  font-weight: 300;
  line-height: 1.4;
  color: var(--ink);
  margin-bottom: 12px;
}

.entry-title-big {
  font-size: 30px;
}

.entry-byline {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.entry-location {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.entry-location::before {
  content: '';
  display: inline-block;
  width: 16px;
  height: 1px;
  background: var(--muted);
}

.entry-note {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  line-height: 2.1;
  color: #3a3630;
  flex: 1;
}

.entry-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--rule);
}

.entry-date {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
}

.entry-mood-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.mood-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

.entry-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.entry-tag {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  border: 1px solid var(--rule);
  padding: 3px 9px;
}

.entry-reactions {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 14px;
}

.react-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  border: 1px solid var(--rule);
  background: transparent;
  padding: 5px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}

.react-btn:hover {
  border-color: var(--ink);
  color: var(--ink);
}

.react-btn.reacted {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

.react-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  display: inline-block;
}

.react-count {
  font-size: 10px;
}

.comment-btn {
  border: none;
  background: none;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  cursor: pointer;
  padding: 5px 0;
  text-decoration: underline;
  text-underline-offset: 3px;
  transition: color 0.15s;
}

.comment-btn:hover {
  color: var(--ink);
}

.mood-0 { background: #2a2420; }
.mood-1 { background: #6a4a3a; }
.mood-2 { background: #4a5a6a; }
.mood-3 { background: #7a6a3a; }
.mood-4 { background: #5a6a4a; }
.mood-5 { background: #6a3a4a; }
.mood-6 { background: #3a4a6a; }
.mood-7 { background: #8a7a5a; }

.empty {
  padding: 80px 0;
  text-align: center;
}

.empty-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 28px;
  color: var(--muted);
  margin-bottom: 8px;
}

.empty-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--rule);
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 12, 10, 0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.overlay.open {
  display: flex;
}

.id-modal {
  background: var(--paper);
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--ink);
  padding: 40px;
}

.id-title {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 26px;
  margin-bottom: 6px;
}

.id-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 28px;
}

.id-field {
  margin-bottom: 16px;
}

.id-field label {
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.id-field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 8px 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.id-field input:focus {
  border-color: var(--ink);
}

.id-hint {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 6px;
}

.id-btn {
  width: 100%;
  margin-top: 24px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  letter-spacing: 5px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.id-btn:hover {
  opacity: 0.8;
}

.id-switch {
  margin-top: 16px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}

.id-switch a {
  color: var(--ink);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.umodal {
  background: var(--paper);
  width: 100%;
  max-width: 640px;
  max-height: 92vh;
  overflow-y: auto;
  border: 1px solid var(--ink);
  padding: 36px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
  cursor: pointer;
}

.modal-close:hover {
  color: var(--ink);
}

.umodal-prev {
  width: 100%;
  max-height: 280px;
  object-fit: cover;
  display: block;
  margin-bottom: 28px;
  filter: contrast(1.04);
}

.umodal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--muted);
  margin-bottom: 24px;
}

.field {
  margin-bottom: 18px;
}

.field label {
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.field input,
.field textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 6px 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus,
.field textarea:focus {
  border-color: var(--ink);
}

.field textarea {
  resize: none;
  min-height: 72px;
  line-height: 1.9;
  margin-top: 4px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.mood-picker {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.mpick {
  padding: 10px 8px;
  border: 1px solid var(--rule);
  background: transparent;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.15s;
  text-align: left;
}

.mpick:hover {
  border-color: var(--ink);
  color: var(--ink);
}

.mpick.sel {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

.mpick.sel .mood-dot {
  background: var(--paper) !important;
}

.submit-btn {
  width: 100%;
  margin-top: 24px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  letter-spacing: 5px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.submit-btn:hover {
  opacity: 0.8;
}

.dmodal {
  background: var(--paper);
  width: 100%;
  max-width: 860px;
  max-height: 94vh;
  overflow-y: auto;
  border: 1px solid var(--ink);
  position: relative;
  display: grid;
  grid-template-columns: 1fr 320px;
}

.dmodal-img-col {
  position: relative;
}

.dmodal-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.04);
  min-height: 400px;
}

.dmodal-right {
  border-left: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  max-height: 94vh;
  overflow-y: auto;
}

.dmodal-body {
  padding: 28px 24px;
  flex: 1;
}

.dmodal-no {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.dmodal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  font-weight: 300;
  margin-bottom: 8px;
  line-height: 1.3;
}

.dmodal-byline {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 14px;
}

.dmodal-meta {
  display: flex;
  gap: 16px;
  align-items: center;
  padding: 12px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.dmodal-loc,
.dmodal-date {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
}

.dmodal-moodrow {
  display: flex;
  align-items: center;
  gap: 6px;
}

.dmodal-note {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  line-height: 2.2;
  color: #3a3630;
}

.dmodal-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.dmodal-tag {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  border: 1px solid var(--rule);
  padding: 3px 9px;
}

.dreact-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 16px 24px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.comments-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.comments-head {
  padding: 14px 24px 10px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  border-bottom: 1px solid var(--rule);
}

.comments-list {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.comment-item {
  padding: 14px 24px;
  border-bottom: 1px solid var(--rule);
}

.comment-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.comment-author {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--ink);
  font-weight: 500;
}

.comment-time {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
}

.comment-text {
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  line-height: 1.9;
  color: #3a3630;
}

.comment-del {
  font-size: 9px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  float: right;
  margin-left: 8px;
}

.comment-del:hover {
  color: #8a3020;
}

.no-comments {
  padding: 28px 24px;
  font-size: 11px;
  color: var(--rule);
  letter-spacing: 2px;
  text-align: center;
  font-style: italic;
  font-family: 'IM Fell English', serif;
}

.comment-form {
  padding: 14px 24px;
  border-top: 1px solid var(--rule);
}

.comment-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 6px 0;
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  color: var(--ink);
  outline: none;
  resize: none;
  min-height: 52px;
  line-height: 1.8;
  transition: border-color 0.2s;
}

.comment-input:focus {
  border-color: var(--ink);
}

.comment-send {
  margin-top: 10px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 8px 20px;
  font-size: 9px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: opacity 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}

.comment-send:hover {
  opacity: 0.8;
}

.dmodal-del {
  display: block;
  margin: 12px 24px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--rule);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s;
  text-align: left;
}

.dmodal-del:hover {
  color: #8a3020;
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--paper);
  padding: 10px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 999;
}

.toast.show {
  opacity: 1;
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><strong>#Film猫</strong> &nbsp;·&nbsp; zine journal</div>
  <div class="nav-right">
    <div class="nav-tag" id="navDate"></div>
    <div class="nav-tag" id="navCount">NO.000</div>
    <div class="nav-user" id="navUser" style="display:none">
      <span class="nav-dot"></span>
      <span id="navName"></span>
      <button style="background:none;border:none;font-size:9px;letter-spacing:2px;color:var(--muted);cursor:pointer;" onclick="logout()">退出</button>
    </div>
    <button id="loginNavBtn" style="background:none;border:1px solid var(--rule);padding:6px 16px;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;" onclick="openId()">登录 / 注册</button>
  </div>
</nav>

<div class="masthead">
  <div class="masthead-left">
    <div class="mag-title"><span class="mag-hash">#</span>Film猫</div>
    <div class="mag-tagline">A shared film photography journal</div>
  </div>
  <div class="masthead-rule"></div>
  <div class="masthead-right">
    <div class="masthead-meta">
      <span id="mhDate"></span>
      <span>INDEPENDENT ZINE</span>
      <span>PHOTOGRAPHY · MEMORY · FEELING</span>
    </div>
    <div class="masthead-count" id="mhCount">000<small>FRAMES COLLECTED</small></div>
  </div>
</div>

<div class="upload-strip">
  <button class="upload-btn" onclick="requireLogin(()=>document.getElementById('fileInput').click())">+ 上传胶片</button>
  <div class="upload-drop-zone" id="dropZone">拖拽照片到此处</div>
  <input type="file" id="fileInput" accept="image/*">
</div>

<div class="gallery">
  <div class="issue-head">
    <span class="issue-label">CONTENTS</span>
    <div class="issue-line"></div>
    <span class="issue-label" id="issueCount"></span>
  </div>
  <div class="zine-grid" id="zineGrid">
    <div class="empty"><div class="empty-title">loading frames...</div><div class="empty-sub">连接Supabase中</div></div>
  </div>
</div>

<!-- Identity Modal -->
<div class="overlay" id="idOverlay">
  <div class="id-modal">
    <div class="id-title" id="idTitle">Welcome.</div>
    <div class="id-sub" id="idSub">SIGN IN TO #FILM猫</div>
    <div class="id-field"><label>署名 / Pen Name</label><input id="idName" type="text" placeholder="你的笔名或昵称" maxlength="20"></div>
    <div class="id-field" id="idPassWrap"><label>密码</label><input id="idPass" type="password" placeholder="······"></div>
    <div class="id-field" id="idPass2Wrap" style="display:none"><label>确认密码</label><input id="idPass2" type="password" placeholder="······"></div>
    <div class="id-hint" id="idHint"></div>
    <button class="id-btn" id="idSubmit" onclick="submitId()">进 入</button>
    <div class="id-switch" id="idSwitch">还没有账号？<a onclick="toggleIdMode()">注册</a></div>
  </div>
</div>

<!-- Upload Modal -->
<div class="overlay" id="uOverlay">
  <div class="umodal">
    <button class="modal-close" onclick="closeU()">CLOSE ×</button>
    <img id="uPrev" class="umodal-prev" src="" alt="">
    <div class="umodal-title">RECORD THIS FRAME</div>
    <div class="field-row">
      <div class="field"><label>Title</label><input id="fTitle" type="text" placeholder="这一刻的名字"></div>
      <div class="field"><label>Location</label><input id="fLoc" type="text" placeholder="地点"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Date</label><input id="fDate" type="date"></div>
      <div class="field"><label>Tags（逗号分隔）</label><input id="fTags" type="text" placeholder="人文, 黄昏, 街拍"></div>
    </div>
    <div class="field">
      <label>Mood</label>
      <div class="mood-picker" id="moodPicker">
        <button class="mpick" data-i="0" onclick="pickMood(this)"><span class="mood-dot mood-0"></span>平静</button>
        <button class="mpick" data-i="1" onclick="pickMood(this)"><span class="mood-dot mood-1"></span>温柔</button>
        <button class="mpick" data-i="2" onclick="pickMood(this)"><span class="mood-dot mood-2"></span>忧郁</button>
        <button class="mpick" data-i="3" onclick="pickMood(this)"><span class="mood-dot mood-3"></span>兴奋</button>
        <button class="mpick" data-i="4" onclick="pickMood(this)"><span class="mood-dot mood-4"></span>治愈</button>
        <button class="mpick" data-i="5" onclick="pickMood(this)"><span class="mood-dot mood-5"></span>孤独</button>
        <button class="mpick" data-i="6" onclick="pickMood(this)"><span class="mood-dot mood-6"></span>沉思</button>
        <button class="mpick" data-i="7" onclick="pickMood(this)"><span class="mood-dot mood-7"></span>怀念</button>
      </div>
    </div>
    <div class="field"><label>Note</label><textarea id="fNote" placeholder="写下当时的心情或故事……"></textarea></div>
    <button class="submit-btn" onclick="save()">— 记 录 —</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="dOverlay">
  <div class="dmodal">
    <div class="dmodal-img-col">
      <img id="dImg" class="dmodal-img" src="" alt="">
    </div>
    <div class="dmodal-right">
      <button class="modal-close" onclick="closeD()" style="position:sticky;top:12px;right:16px;margin:12px 16px 0 auto;display:block;">CLOSE ×</button>
      <div class="dmodal-body">
        <div class="dmodal-no" id="dNo"></div>
        <div class="dmodal-title" id="dTitle"></div>
        <div class="dmodal-byline" id="dByline"></div>
        <div class="dmodal-meta">
          <span class="dmodal-date" id="dDate"></span>
          <span class="dmodal-loc" id="dLoc"></span>
          <div class="dmodal-moodrow"><span class="mood-dot" id="dMoodDot"></span><span class="dmodal-date" id="dMoodLbl"></span></div>
        </div>
        <div class="dmodal-note" id="dNote"></div>
        <div class="dmodal-tags" id="dTags"></div>
        <button class="dmodal-del" id="dDel" style="display:none">DELETE THIS FRAME</button>
      </div>
      <div class="dreact-row" id="dReacts"></div>
      <div class="comments-section">
        <div class="comments-head">COMMENTS</div>
        <div class="comments-list" id="commentsList"></div>
        <div class="comment-form">
          <textarea class="comment-input" id="commentInput" placeholder="写下你的想法……" rows="2"></textarea>
          <button class="comment-send" onclick="sendComment()">发 送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 第一部分结束，请接着粘贴第二部分（JavaScript） -->
