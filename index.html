<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#Film猫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#1a1814;--paper:#f7f4ef;--rule:#d4cfc6;--muted:#9a9088;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

nav{display:flex;justify-content:space-between;align-items:baseline;padding:18px 40px 14px;border-bottom:1px solid var(--ink);}
.nav-logo{font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:4px;font-weight:300;}
.nav-logo strong{font-weight:600;font-size:17px;letter-spacing:2px;}
.nav-right{display:flex;gap:24px;align-items:center;}
.nav-tag{font-size:10px;letter-spacing:2px;color:var(--muted);}
.nav-user{font-size:11px;letter-spacing:2px;color:var(--ink);display:flex;align-items:center;gap:8px;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--ink);display:inline-block;}
.nav-out{background:none;border:none;font-size:9px;letter-spacing:2px;color:var(--muted);cursor:pointer;}
.nav-out:hover{color:var(--ink);}
.nav-login{background:none;border:1px solid var(--rule);padding:6px 16px;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.nav-login:hover{border-color:var(--ink);color:var(--ink);}

.masthead{display:grid;grid-template-columns:1fr 1px 1fr;padding:40px 40px 32px;border-bottom:1px solid var(--rule);}
.masthead-left{padding-right:32px;}
.masthead-rule{background:var(--rule);}
.masthead-right{padding-left:32px;display:flex;flex-direction:column;justify-content:flex-end;}
.mag-title{font-family:'IM Fell English',serif;font-style:italic;font-size:64px;line-height:1;letter-spacing:-1px;margin-bottom:4px;}
.mag-hash{font-size:28px;font-style:normal;}
.mag-tagline{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:10px;text-transform:uppercase;}
.masthead-meta{font-size:10px;color:var(--muted);letter-spacing:2px;line-height:2.2;}
.masthead-meta span{display:block;}
.masthead-count{font-family:'Noto Serif JP',serif;font-size:32px;font-weight:300;margin-top:8px;}
.masthead-count small{font-size:11px;letter-spacing:2px;color:var(--muted);display:block;margin-top:2px;}

.upload-strip{padding:20px 40px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:16px;}
.upload-btn{background:var(--ink);color:var(--paper);padding:10px 24px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:11px;letter-spacing:3px;transition:opacity 0.2s;flex-shrink:0;}
.upload-btn:hover{opacity:0.8;}
.drop-zone{flex:1;border:1px dashed var(--rule);padding:10px 16px;font-size:10px;color:var(--muted);letter-spacing:2px;cursor:pointer;text-align:center;transition:border-color 0.2s;}
.drop-zone:hover,.drop-zone.over{border-color:var(--ink);}
#fileInput{display:none;}

.gallery{padding:0 40px 60px;}
.issue-head{display:flex;align-items:baseline;gap:16px;padding:24px 0 16px;border-bottom:1px solid var(--rule);margin-bottom:28px;}
.issue-label{font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:4px;color:var(--muted);}
.issue-line{flex:1;height:1px;background:var(--rule);}

.zine-grid{display:flex;flex-direction:column;}
.zine-entry{border-bottom:1px solid var(--rule);padding:32px 0;}
.zine-entry:last-child{border-bottom:none;}
.layout-a{display:grid;grid-template-columns:3fr 2fr;}
.layout-b{}
.layout-c{display:grid;grid-template-columns:2fr 3fr;}

.img-wrap{overflow:hidden;cursor:pointer;}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.04) brightness(0.98);transition:filter 0.3s;}
.img-wrap:hover img{filter:contrast(1.08) brightness(0.92);}
.layout-a .img-wrap{height:380px;}
.layout-b .img-wrap{height:440px;}
.layout-c .img-wrap{height:320px;}

.entry-body{padding:0 32px;display:flex;flex-direction:column;justify-content:space-between;}
.layout-b .entry-body{display:grid;grid-template-columns:1fr 1px 1fr;padding:24px 0 0;}
.layout-b .col1{padding-right:28px;}
.layout-b .col-rule{background:var(--rule);}
.layout-b .col2{padding-left:28px;display:flex;flex-direction:column;justify-content:flex-end;}

.entry-no{font-family:'IM Fell English',serif;font-style:italic;font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;display:block;}
.entry-byline{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;}
.entry-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:300;line-height:1.4;margin-bottom:12px;}
.entry-title-big{font-size:30px;}
.entry-loc{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:6px;}
.entry-loc::before{content:'';display:inline-block;width:16px;height:1px;background:var(--muted);}
.entry-note{font-family:'Noto Serif JP',serif;font-size:13px;line-height:2.1;color:#3a3630;flex:1;}
.entry-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--rule);}
.entry-date{font-size:10px;letter-spacing:2px;color:var(--muted);}
.mood-row{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:2px;color:var(--muted);}
.mood-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.entry-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.entry-tag{font-size:9px;letter-spacing:2px;color:var(--muted);border:1px solid var(--rule);padding:3px 9px;}
.entry-reacts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.react-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--rule);background:transparent;padding:5px 11px;font-family:'Noto Sans JP',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.react-btn:hover{border-color:var(--ink);color:var(--ink);}
.react-btn.on{border-color:var(--ink);background:var(--ink);color:var(--paper);}
.react-btn.on .rdot{background:var(--paper)!important;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;flex-shrink:0;}
.cmt-btn{background:none;border:none;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;padding:5px 0;text-decoration:underline;text-underline-offset:3px;margin-top:10px;display:inline-block;}
.cmt-btn:hover{color:var(--ink);}

.mood-0{background:#2a2420;}.mood-1{background:#6a4a3a;}.mood-2{background:#4a5a6a;}
.mood-3{background:#7a6a3a;}.mood-4{background:#5a6a4a;}.mood-5{background:#6a3a4a;}
.mood-6{background:#3a4a6a;}.mood-7{background:#8a7a5a;}

.empty{padding:80px 0;text-align:center;}
.empty-title{font-family:'IM Fell English',serif;font-style:italic;font-size:28px;color:var(--muted);margin-bottom:8px;}
.empty-sub{font-size:10px;letter-spacing:3px;color:var(--rule);}

/* overlays */
.ov{display:none;position:fixed;inset:0;background:rgba(15,12,10,0.8);z-index:200;align-items:center;justify-content:center;padding:24px;}
.ov.open{display:flex;}
.modal{background:var(--paper);border:1px solid var(--ink);position:relative;}
.mclose{position:absolute;top:14px;right:18px;background:none;border:none;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;}
.mclose:hover{color:var(--ink);}

/* id modal */
.id-modal{padding:40px;width:100%;max-width:400px;}
.id-title{font-family:'IM Fell English',serif;font-style:italic;font-size:26px;margin-bottom:4px;}
.id-sub{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.field input,.field textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--rule);padding:8px 0;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.2s;}
.field input:focus,.field textarea:focus{border-color:var(--ink);}
.field textarea{resize:none;line-height:1.9;min-height:68px;margin-top:4px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.hint{font-size:10px;color:#8a3020;letter-spacing:1px;margin-top:6px;min-height:16px;}
.big-btn{width:100%;margin-top:22px;background:var(--ink);color:var(--paper);border:none;padding:13px;font-family:'Noto Sans JP',sans-serif;font-size:10px;letter-spacing:5px;cursor:pointer;transition:opacity 0.2s;}
.big-btn:hover{opacity:0.8;}
.id-switch{margin-top:14px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;}
.id-switch a{color:var(--ink);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}

/* upload modal */
.u-modal{padding:36px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.u-prev{width:100%;max-height:280px;object-fit:cover;display:block;margin-bottom:26px;filter:contrast(1.04);}
.u-head{font-family:'Noto Serif JP',serif;font-size:12px;font-weight:300;letter-spacing:4px;color:var(--muted);margin-bottom:22px;}
.mood-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mpick{padding:10px 8px;border:1px solid var(--rule);background:transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:7px;transition:all 0.15s;}
.mpick:hover{border-color:var(--ink);color:var(--ink);}
.mpick.sel{border-color:var(--ink);background:var(--ink);color:var(--paper);}
.mpick.sel .mood-dot{background:var(--paper)!important;}

/* detail modal */
.d-modal{width:100%;max-width:860px;max-height:94vh;display:grid;grid-template-columns:1fr 320px;}
.d-img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.04);min-height:400px;}
.d-right{border-left:1px solid var(--rule);display:flex;flex-direction:column;max-height:94vh;overflow-y:auto;}
.d-body{padding:26px 22px;flex:1;}
.d-no{font-family:'IM Fell English',serif;font-style:italic;font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;}
.d-title{font-family:'Noto Serif JP',serif;font-size:21px;font-weight:300;margin-bottom:6px;line-height:1.3;}
.d-byline{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.d-meta{display:flex;gap:14px;align-items:center;padding:10px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:16px;flex-wrap:wrap;}
.d-info{font-size:10px;letter-spacing:2px;color:var(--muted);}
.d-note{font-family:'Noto Serif JP',serif;font-size:13px;line-height:2.2;color:#3a3630;}
.d-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
.d-tag{font-size:9px;letter-spacing:2px;color:var(--muted);border:1px solid var(--rule);padding:3px 9px;}
.d-del{display:block;margin:10px 22px 0;font-size:9px;letter-spacing:2px;color:var(--rule);background:none;border:none;cursor:pointer;padding:0;}
.d-del:hover{color:#8a3020;}
.d-reacts{display:flex;gap:8px;flex-wrap:wrap;padding:14px 22px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.cmt-section{flex:1;display:flex;flex-direction:column;}
.cmt-head{padding:12px 22px 8px;font-size:10px;letter-spacing:3px;color:var(--muted);border-bottom:1px solid var(--rule);}
.cmt-list{flex:1;overflow-y:auto;}
.cmt-item{padding:12px 22px;border-bottom:1px solid var(--rule);}
.cmt-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.cmt-author{font-size:10px;letter-spacing:2px;font-weight:500;}
.cmt-time{font-size:9px;letter-spacing:1px;color:var(--muted);}
.cmt-text{font-family:'Noto Serif JP',serif;font-size:12px;line-height:1.9;color:#3a3630;}
.cmt-del{font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;margin-left:8px;}
.cmt-del:hover{color:#8a3020;}
.no-cmt{padding:24px;font-size:11px;color:var(--rule);text-align:center;font-style:italic;font-family:'IM Fell English',serif;}
.cmt-form{padding:12px 22px;border-top:1px solid var(--rule);}
.cmt-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--rule);padding:6px 0;font-family:'Noto Serif JP',serif;font-size:12px;color:var(--ink);outline:none;resize:none;min-height:48px;line-height:1.8;}
.cmt-input:focus{border-color:var(--ink);}
.cmt-send{margin-top:8px;background:var(--ink);color:var(--paper);border:none;padding:7px 18px;font-size:9px;letter-spacing:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.cmt-send:hover{opacity:0.8;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 22px;font-size:10px;letter-spacing:3px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.loading{text-align:center;padding:60px;font-size:11px;letter-spacing:3px;color:var(--muted);}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><strong>#Film猫</strong> &nbsp;·&nbsp; zine journal</div>
  <div class="nav-right">
    <div class="nav-tag" id="navDate"></div>
    <div class="nav-tag" id="navCount">NO.000</div>
    <div class="nav-user" id="navUser" style="display:none">
      <span class="nav-dot"></span>
      <span id="navName"></span>
      <button class="nav-out" onclick="logout()">退出</button>
    </div>
    <button class="nav-login" id="loginBtn" onclick="openId()">登录 / 注册</button>

<div class="masthead">
  <div class="masthead-left">
    <div class="mag-title"><span class="mag-hash">#</span>Film猫</div>
    <div class="mag-tagline">A shared film photography journal</div>
  </div>
  <div class="masthead-rule"></div>
  <div class="masthead-right">
    <div class="masthead-meta">
      <span id="mhDate"></span>
      <span>INDEPENDENT ZINE</span>
      <span>PHOTOGRAPHY · MEMORY · FEELING</span>
    </div>
    <div class="masthead-count" id="mhCount">000<small>FRAMES COLLECTED</small></div>

</div>

<div class="upload-strip">
  <button class="upload-btn" onclick="requireLogin(()=>document.getElementById('fileInput').click())">+ 上传胶片</button>
  <div class="drop-zone" id="dropZone">拖拽照片到此处</div>
  <input type="file" id="fileInput" accept="image/*">
</div>

<div class="gallery">
  <div class="issue-head">
    <span class="issue-label">CONTENTS</span>
    <div class="issue-line"></div>
    <span class="issue-label" id="issueCount"></span>
  </div>
  <div id="zineGrid"><div class="loading">— loading —</div></div>
</div>

<!-- Identity Modal -->
<div class="ov" id="idOv">
  <div class="modal id-modal">
    <button class="mclose" onclick="closeId()">CLOSE ×</button>
    <div class="id-title" id="idTitle">Welcome.</div>
    <div class="id-sub" id="idSub">SIGN IN TO #FILM猫</div>
    <div class="field"><label>署名 / Pen Name</label><input id="idName" type="text" placeholder="你的笔名" maxlength="20"></div>
    <div class="field"><label>密码</label><input id="idPass" type="password" placeholder="······"></div>
    <div class="field" id="pass2Wrap" style="display:none"><label>确认密码</label><input id="idPass2" type="password" placeholder="······"></div>
    <div class="hint" id="idHint"></div>
    <button class="big-btn" onclick="submitId()">进 入</button>
    <div class="id-switch" id="idSwitch">还没有账号？<a onclick="toggleMode()">注册</a></div>
  </div>
</div>

<!-- Upload Modal -->
<div class="ov" id="uOv">
  <div class="modal u-modal">
    <button class="mclose" onclick="closeU()">CLOSE ×</button>
    <img id="uPrev" class="u-prev" src="" alt="">
    <div class="u-head">RECORD THIS FRAME</div>
    <div class="field-row">
      <div class="field"><label>Title</label><input id="fTitle" type="text" placeholder="这一刻的名字"></div>
      <div class="field"><label>Location</label><input id="fLoc" type="text" placeholder="地点"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Date</label><input id="fDate" type="date"></div>
      <div class="field"><label>Tags（逗号分隔）</label><input id="fTags" type="text" placeholder="人文, 黄昏"></div>
    </div>
    <div class="field">
      <label>Mood</label>
      <div class="mood-picker">
        <button class="mpick" data-i="0" onclick="pickMood(this)"><span class="mood-dot mood-0"></span>平静</button>
        <button class="mpick" data-i="1" onclick="pickMood(this)"><span class="mood-dot mood-1"></span>温柔</button>
        <button class="mpick" data-i="2" onclick="pickMood(this)"><span class="mood-dot mood-2"></span>忧郁</button>
        <button class="mpick" data-i="3" onclick="pickMood(this)"><span class="mood-dot mood-3"></span>兴奋</button>
        <button class="mpick" data-i="4" onclick="pickMood(this)"><span class="mood-dot mood-4"></span>治愈</button>
        <button class="mpick" data-i="5" onclick="pickMood(this)"><span class="mood-dot mood-5"></span>孤独</button>
        <button class="mpick" data-i="6" onclick="pickMood(this)"><span class="mood-dot mood-6"></span>沉思</button>
        <button class="mpick" data-i="7" onclick="pickMood(this)"><span class="mood-dot mood-7"></span>怀念</button>
      </div>
    </div>
    <div class="field"><label>Note</label><textarea id="fNote" placeholder="写下当时的心情或故事……"></textarea></div>
    <button class="big-btn" onclick="savePhoto()">— 记 录 —</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="ov" id="dOv">
  <div class="modal d-modal">
    <div style="position:relative;overflow:hidden;">
      <img id="dImg" class="d-img" src="" alt="">
    </div>
    <div class="d-right">
      <button class="mclose" style="position:sticky;top:12px;right:16px;margin:12px 14px 0 auto;display:block;" onclick="closeD()">CLOSE ×</button>
      <div class="d-body">
        <div class="d-no" id="dNo"></div>
        <div class="d-title" id="dTitle2"></div>
        <div class="d-byline" id="dByline"></div>
        <div class="d-meta">
          <span class="d-info" id="dDate2"></span>
          <span class="d-info" id="dLoc2"></span>
          <div class="mood-row"><span class="mood-dot" id="dMoodDot"></span><span class="d-info" id="dMoodLbl"></span></div>
        </div>
        <div class="d-note" id="dNote2"></div>
        <div class="d-tags" id="dTags2"></div>
        <button class="d-del" id="dDel" style="display:none">DELETE THIS FRAME</button>
      </div>
      <div class="d-reacts" id="dReacts"></div>
      <div class="cmt-section">
        <div class="cmt-head">COMMENTS</div>
        <div class="cmt-list" id="cmtList"></div>
        <div class="cmt-form">
          <textarea class="cmt-input" id="cmtInput" placeholder="写下你的想法……" rows="2"></textarea>
          <button class="cmt-send" onclick="sendComment()">发 送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://igqkwtlxehssfqryxjfc.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlncWt3dGx4ZWhzc2ZncnlYamZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzM5OTIsImV4cCI6MjA5MjMwOTk5Mn0.h2PA7wzhtQI8VUO5-kMHHWEIyTBlaJVVI1UNtjivix';
const HDR = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const MOODS=['平静','温柔','忧郁','兴奋','治愈','孤独','沉思','怀念'];
const LAYOUTS=['layout-a','layout-b','layout-c','layout-a','layout-c','layout-b'];
const REACTS=[{k:'resonance',l:'共鸣'},{k:'touched',l:'触动'},{k:'beautiful',l:'美'},{k:'quiet',l:'静'},{k:'wander',l:'漫游'}];

let session=JSON.parse(sessionStorage.getItem('fc_s')||'null');
let pending=null, selMood=-1, curId=null, idMode='login';

async function api(method,table,body,params=''){
  const r=await fetch(`${SB_URL}/${table}${params}`,{method,headers:{...HDR,...(method!=='GET'?{'Prefer':'return=representation'}:{})},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.json();throw new Error(e.message||r.status);}
  return method==='DELETE'?null:r.json();
}
const GET=(t,p='')=>api('GET',t,null,p);
const POST=(t,b)=>api('POST',t,b);
const PATCH=(t,b,p)=>api('PATCH',t,b,p);
const DELETE=(t,p)=>api('DELETE',t,null,p);

function init(){
  const now=new Date();
  const ds=now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'.');
  document.getElementById('navDate').textContent=ds;
  document.getElementById('mhDate').textContent=ds;
  document.getElementById('fDate').value=now.toISOString().split('T')[0];
  updateSessionUI();
  loadPhotos();
}

function updateSessionUI(){
  if(session){
    document.getElementById('navUser').style.display='flex';
    document.getElementById('navName').textContent=session.name;
    document.getElementById('loginBtn').style.display='none';
  }else{
    document.getElementById('navUser').style.display='none';
    document.getElementById('loginBtn').style.display='block';
  }
}
function logout(){session=null;sessionStorage.removeItem('fc_s');updateSessionUI();toast('已退出');}
let pendingCb=null;
function requireLogin(cb){if(session)cb();else{pendingCb=cb;openId();}}
function openId(){document.getElementById('idOv').classList.add('open');}
function closeId(){document.getElementById('idOv').classList.remove('open');}
function toggleMode(){
  idMode=idMode==='login'?'register':'login';
  document.getElementById('idTitle').textContent=idMode==='login'?'Welcome.':'Join us.';
  document.getElementById('idSub').textContent=idMode==='login'?'SIGN IN TO #FILM猫':'CREATE YOUR PEN NAME';
  document.getElementById('pass2Wrap').style.display=idMode==='register'?'block':'none';
  document.getElementById('idSwitch').innerHTML=idMode==='login'?'还没有账号？<a onclick="toggleMode()">注册</a>':'已有账号？<a onclick="toggleMode()">登录</a>';
  document.getElementById('idHint').textContent='';
}
async function submitId(){
  const name=document.getElementById('idName').value.trim();
  const pass=document.getElementById('idPass').value;
  if(!name||!pass){document.getElementById('idHint').textContent='请填写完整';return;}
  try{
    if(idMode==='register'){
      const p2=document.getElementById('idPass2').value;
      if(pass!==p2){document.getElementById('idHint').textContent='两次密码不一致';return;}
      const ex=await GET('profiles','?name=eq.'+encodeURIComponent(name));
      if(ex.length){document.getElementById('idHint').textContent='署名已被使用';return;}
      await POST('profiles',{name,password:pass});
      toast('欢迎，'+name);
    }else{
      const rows=await GET('profiles','?name=eq.'+encodeURIComponent(name)+'&password=eq.'+encodeURIComponent(pass));
      if(!rows.length){document.getElementById('idHint').textContent='署名或密码错误';return;}
      toast('欢迎回来，'+name);
    }
    session={name};sessionStorage.setItem('fc_s',JSON.stringify(session));
    updateSessionUI();closeId();
    if(pendingCb){pendingCb();pendingCb=null;}
  }catch(e){document.getElementById('idHint').textContent='服务错误，请稍后再试';}
}

// DRAG DROP
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))requireLogin(()=>openU(f));});
dz.addEventListener('click',()=>requireLogin(()=>document.getElementById('fileInput').click()));
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])openU(e.target.files[0]);e.target.value='';});

function openU(f){pending=f;const r=new FileReader();r.onload=ev=>{document.getElementById('uPrev').src=ev.target.result;document.getElementById('uOv').classList.add('open');};r.readAsDataURL(f);}
function closeU(){document.getElementById('uOv').classList.remove('open');pending=null;selMood=-1;document.querySelectorAll('.mpick').forEach(b=>b.classList.remove('sel'));['fTitle','fLoc','fNote','fTags'].forEach(id=>document.getElementById(id).value='');}
function pickMood(btn){document.querySelectorAll('.mpick').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');selMood=+btn.dataset.i;}

async function savePhoto(){
  if(!pending||!session)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      await POST('photos',{
        author:session.name,
        title:document.getElementById('fTitle').value||'無題',
        loc:document.getElementById('fLoc').value,
        date:document.getElementById('fDate').value,
        mood:selMood>=0?selMood:null,
        note:document.getElementById('fNote').value,
        tags:document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean),
        src:ev.target.result
      });
      closeU();toast('已记录');loadPhotos();
    }catch(e){toast('保存失败：'+e.message);}
  };
  r.readAsDataURL(pending);
}

async function loadPhotos(){
  try{
    const photos=await GET('photos','?order=id.desc');
    renderAll(photos);
    const n=photos.length;
    const s=String(n).padStart(3,'0');
    document.getElementById('navCount').textContent='NO.'+s;
    document.getElementById('mhCount').innerHTML=s+'<small>FRAMES COLLECTED</small>';
    document.getElementById('issueCount').textContent=n?n+' FRAMES':'';
  }catch(e){document.getElementById('zineGrid').innerHTML='<div class="loading">加载失败，请刷新</div>';}
}

function renderAll(photos){
  const g=document.getElementById('zineGrid');
  if(!photos.length){g.innerHTML='<div class="empty"><div class="empty-title">no frames yet.</div><div class="empty-sub">上传你的第一张胶片</div></div>';return;}
  g.innerHTML=photos.map((p,i)=>{
    const lay=LAYOUTS[i%LAYOUTS.length];
    const no='No.'+(String(photos.length-i).padStart(3,'0'));
    const moodLbl=p.mood!=null?`<div class="mood-row"><span class="mood-dot mood-${p.mood}"></span>${MOODS[p.mood]}</div>`:'';
    const tags=p.tags&&p.tags.length?`<div class="entry-tags">${p.tags.map(t=>`<span class="entry-tag">${t}</span>`).join('')}</div>`:'';
    const foot=`<div class="entry-foot"><span class="entry-date">${fmtDate(p.date)}</span>${moodLbl}</div>${tags}<div class="entry-reacts" id="cr-${p.id}"></div><button class="cmt-btn" onclick="event.stopPropagation();openD(${p.id})">留言</button>`;
    let html='';
    if(lay==='layout-a') html=`<div class="zine-entry layout-a"><div class="img-wrap" onclick="openD(${p.id})"><img src="${p.src}" loading="lazy" alt="${p.title}"></div><div class="entry-body"><div><span class="entry-no">${no}</span><div class="entry-byline">by ${p.author}</div><div class="entry-title entry-title-big">${p.title}</div>${p.loc?`<div class="entry-loc">${p.loc}</div>`:''}<div class="entry-note">${p.note||''}</div></div>${foot}</div></div>`;
    else if(lay==='layout-b') html=`<div class="zine-entry layout-b"><div class="img-wrap" onclick="openD(${p.id})"><img src="${p.src}" loading="lazy" alt="${p.title}"></div><div class="entry-body"><div class="col1"><span class="entry-no">${no}</span><div class="entry-byline">by ${p.author}</div><div class="entry-title entry-title-big">${p.title}</div>${p.loc?`<div class="entry-loc">${p.loc}</div>`:''}</div><div class="col-rule"></div><div class="col2"><div class="entry-note">${p.note||''}</div>${foot}</div></div></div>`;
    else html=`<div class="zine-entry layout-c"><div class="entry-body"><div><span class="entry-no">${no}</span><div class="entry-byline">by ${p.author}</div><div class="entry-title">${p.title}</div>${p.loc?`<div class="entry-loc">${p.loc}</div>`:''}<div class="entry-note">${p.note||''}</div></div>${foot}</div><div class="img-wrap" onclick="openD(${p.id})"><img src="${p.src}" loading="lazy" alt="${p.title}"></div></div>`;
    return html;
  }).join('');
  photos.forEach(p=>loadCardReacts(p.id));
}

async function loadCardReacts(pid){
  const el=document.getElementById('cr-'+pid);if(!el)return;
  try{
    const rows=await GET('reactions','?photo_id=eq.'+pid);
    const counts={};
    rows.forEach(r=>{counts[r.reaction_key]=(counts[r.reaction_key]||0)+1;});
    el.innerHTML=REACTS.filter(r=>counts[r.k]).map(r=>{
      const on=session&&rows.some(x=>x.reaction_key===r.k&&x.user_name===session.name);
      return `<button class="react-btn${on?' on':''}" onclick="event.stopPropagation();toggleReact(${pid},'${r.k}')"><span class="rdot"></span>${r.l} ${counts[r.k]}</button>`;
    }).join('');
  }catch{}
}

async function toggleReact(pid,key){
  if(!session){requireLogin(()=>toggleReact(pid,key));return;}
  try{
    const rows=await GET('reactions',`?photo_id=eq.${pid}&user_name=eq.${encodeURIComponent(session.name)}&reaction_key=eq.${key}`);
    if(rows.length) await DELETE('reactions',`?photo_id=eq.${pid}&user_name=eq.${encodeURIComponent(session.name)}&reaction_key=eq.${key}`);
    else await POST('reactions',{photo_id:pid,user_name:session.name,reaction_key:key});
    loadCardReacts(pid);
    if(curId===pid)loadDetailReacts(pid);
  }catch(e){toast('操作失败');}
}

async function loadDetailReacts(pid){
  const el=document.getElementById('dReacts');if(!el)return;
  try{
    const rows=await GET('reactions','?photo_id=eq.'+pid);
    const counts={};rows.forEach(r=>{counts[r.reaction_key]=(counts[r.reaction_key]||0)+1;});
    el.innerHTML=REACTS.map(r=>{
      const n=counts[r.k]||0;
      const on=session&&rows.some(x=>x.reaction_key===r.k&&x.user_name===session.name);
      return `<button class="react-btn${on?' on':''}" onclick="toggleReact(${pid},'${r.k}')"><span class="rdot"></span>${r.l}${n?` ${n}`:''}</button>`;
    }).join('');
  }catch{}
}

async function openD(id){
  curId=id;
  try{
    const rows=await GET('photos','?id=eq.'+id);
    const p=rows[0];if(!p)return;
    const all=await GET('photos','?order=id.desc&select=id');
    const idx=all.findIndex(x=>x.id===id);
    document.getElementById('dImg').src=p.src;
    document.getElementById('dNo').textContent='No.'+(String(all.length-idx).padStart(3,'0'));
    document.getElementById('dTitle2').textContent=p.title;
    document.getElementById('dByline').textContent='by '+p.author;
    document.getElementById('dDate2').textContent=fmtDate(p.date);
    document.getElementById('dLoc2').textContent=p.loc||'';
    const dot=document.getElementById('dMoodDot');
    const lbl=document.getElementById('dMoodLbl');
    if(p.mood!=null){dot.className='mood-dot mood-'+p.mood;lbl.textContent=MOODS[p.mood];}else{dot.className='mood-dot';lbl.textContent='';}
    document.getElementById('dNote2').textContent=p.note||'';
    document.getElementById('dTags2').innerHTML=(p.tags||[]).map(t=>`<span class="d-tag">${t}</span>`).join('');
    const del=document.getElementById('dDel');
    if(session&&session.name===p.author){del.style.display='block';del.onclick=async()=>{if(confirm('删除这帧记录？')){await DELETE('photos','?id=eq.'+id);closeD();toast('已删除');loadPhotos();}};}
    else del.style.display='none';
    loadDetailReacts(id);
    loadComments(id);
    document.getElementById('dOv').classList.add('open');
  }catch(e){toast('加载失败');}
}
function closeD(){document.getElementById('dOv').classList.remove('open');curId=null;}

async function loadComments(pid){
  const list=document.getElementById('cmtList');
  try{
    const rows=await GET('comments','?photo_id=eq.'+pid+'&order=id.asc');
    if(!rows.length){list.innerHTML='<div class="no-cmt">— no comments yet —</div>';return;}
    list.innerHTML=rows.map(c=>{
      const t=new Date(c.created_at);
      const ts=t.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}).replace('/','.') +' '+t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      const canDel=session&&(session.name===c.author);
      return `<div class="cmt-item"><div class="cmt-meta"><span class="cmt-author">${c.author}</span><span class="cmt-time">${ts}${canDel?`<button class="cmt-del" onclick="delComment(${c.id},${pid})">×</button>`:''}</span></div><div class="cmt-text">${c.text}</div></div>`;
    }).join('');
    list.scrollTop=list.scrollHeight;
  }catch{}
}
async function sendComment(){
  if(!session){requireLogin(sendComment);return;}
  const txt=document.getElementById('cmtInput').value.trim();if(!txt||!curId)return;
  try{
    await POST('comments',{photo_id:curId,author:session.name,text:txt});
    document.getElementById('cmtInput').value='';
    loadComments(curId);
  }catch(e){toast('发送失败');}
}
async function delComment(cid,pid){
  try{await DELETE('comments','?id=eq.'+cid);loadComments(pid);}catch{}
}

function fmtDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'.');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

document.getElementById('idOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeId();});
document.getElementById('uOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeU();});
document.getElementById('dOv').addEventListener('click',e=>{if(e.target===e.currentTarget)closeD();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeId();closeU();closeD();}});

init();
</script>
</body>
</html>
